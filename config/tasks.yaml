# Définition des tâches
tasks:
  extraction_connections:
    agent: extracteur_linkedin_connections
    input_folder: dossier_linkedin_connections
    input_file: connections.csv
    output_tab: ListeContacts_Lin_connexions
    champs: [nom, email]

  extraction_messages:
    agent: extracteur_linkedin_messages
    input_folder: dossier_linkedin_messages
    input_file: messages.csv
    output_tab: ListeContacts_Lin_messages
    champs: [nom, email]

  extraction_outlook:
    agent: extracteur_outlook
    input: "Boîte Outlook pierre.bono@f-r-d.fr via Graph API"
    output_tab: ListeContacts_Out
    champs: [nom, prenom, email]
    inclure_cc: true

  nettoyage:
    agent: nettoyeur
    input_folder: dossier_liste_brute
    filtre: "colonne 'A vérifier' == 1 → supprimer"
    deduplication: true
    output_folder: dossier_liste_finale
    output_tab: ListeContacts_Lin_Out_FINAL
